<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/style_addon_spoiler.css">

  <title>QR-TXT Editor</title>                                        <!-- название саита -->
 <!-- <link rel="icon" href="img/icon/site_icon.svg" type="image/svg+xml">      иконка саита -->

  <!-- иконка сгенерирована из свг, тут -->
  <!-- https://realfavicongenerator.net/ -->
  <!-- следующий код предоставлен также саитом -->

  <link rel="apple-touch-icon" sizes="180x180" href="img/icon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icon/favicon-16x16.png">
  <link rel="manifest" href="img/icon/site.webmanifest">
  <link rel="mask-icon" href="img/icon/safari-pinned-tab.svg" color="#1ba200">
  <link rel="shortcut icon" href="img/icon/favicon.ico">
  <meta name="msapplication-TileColor" content="#00a300">
  <meta name="msapplication-TileImage" content="img/icon/mstile-144x144.png">
  <meta name="msapplication-config" content="img/icon/browserconfig.xml">
  <meta name="theme-color" content="#1ba200">

</head>

<body class="body">

  <header class="header">
    <h1 class="header__head">QR-TXT Editor</h1>
    <hr class="horisontal_line">
  </header>

	<main class="main">
    <menu class="menu">
      <input type="file" class="js-file_uploader" id="id_file_uploader" accept=".txt, .csv">
      <label for="id_file_uploader" class="def_btn" title="выбрать фаил">Выберите файл</label>
      <button class="def_btn btn_filter_qr" title="удалить лишнее">Удалить лишнее</button>
      <div class="handle_decompile">
        <button class="def_btn btn_decomp" title="разбить на фаилы">Разбить на фаилы</button>
        <input class="btn_decomp_n" type="number" name="num" min="5" max="200" value="100" step="1">
        <label for="btn_decomp_n">Макс. количество кодов в фаиле</label>
      </div>
      <button class="def_btn btn_download" title="скачать архив фаилов">Cкачать фаилы</button>
    </menu>
    <section class="file_info">
      <h3 class="visually_hidden">информация о фаиле</h3>
      <p class="file_info__name">Фаил: <span class="text_blue" title=""></span></p>
      <p class="file_info__size">Размер фаила: <span class="text_blue"></span></p>
      <p class="file_info__QRn">Количество строк: <span class="text_blue"></span></p>
    </section>
    <section class="text_in_file">
      <h3 class="visually_hidden">Содержание фаила</h3>
      <div class="text_in_file__container">
        <!-- <plaintext class= "text_in_file__text"></plaintext> -->
      </div>
    </section>
  </main>

  <footer class="footer">
    <a href="https://github.com/bigmack2304/qr-txt-decompiller" class="icon_link icon_link--header_pos" title="Страница проекта на GitHub">
      <svg class="icon_link__icon_size icon_link__icon_color">
        <use xlink:href="#icon_github"></use>
      </svg>
    </a>
  </footer>



  <svg class="svg_sprait">
    <symbol id="icon_github" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewbox="0 0 640 640">
      <path d="M319.988 7.973C143.293 7.973 0 151.242 0 327.96c0 141.392 91.678 261.298 218.826 303.63 16.004 2.964 21.886-6.957 21.886-15.414 0-7.63-.319-32.835-.449-59.552-89.032 19.359-107.8-37.772-107.8-37.772-14.552-36.993-35.529-46.831-35.529-46.831-29.032-19.879 2.209-19.442 2.209-19.442 32.126 2.245 49.04 32.954 49.04 32.954 28.56 48.922 74.883 34.76 93.131 26.598 2.882-20.681 11.15-34.807 20.315-42.803-71.08-8.067-145.797-35.516-145.797-158.14 0-34.926 12.52-63.485 32.965-85.88-3.33-8.078-14.291-40.606 3.083-84.674 0 0 26.87-8.61 88.029 32.8 25.512-7.075 52.878-10.642 80.056-10.76 27.2.118 54.614 3.673 80.162 10.76 61.076-41.386 87.922-32.8 87.922-32.8 17.398 44.08 6.485 76.631 3.154 84.675 20.516 22.394 32.93 50.953 32.93 85.879 0 122.907-74.883 149.93-146.117 157.856 11.481 9.921 21.733 29.398 21.733 59.233 0 42.792-.366 77.28-.366 87.804 0 8.516 5.764 18.473 21.992 15.354 127.076-42.354 218.637-162.274 218.637-303.582 0-176.695-143.269-319.988-320-319.988l-.023.107z"></path>
    </symbol>
  </svg>

  <script src="js/s_addon_spoiler.js" async></script>
  <script src="js/papaparse.min.js" async></script>
  <script src="js/addon_error_edit.js"></script>
  <script src="js/jszip-main/vendor/FileSaver.js"></script>  
  <script src="js/jszip-main/dist/jszip.js"></script>
  <script src="js/qr_descriptor.js" async></script>   <!--тег async позволит не блокировать страницу до полной загрузки скрипта-->
</body>

</html>
